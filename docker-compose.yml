services:
  qwen35-35b:
    image: vllm/vllm-openai:cu130-nightly
    container_name: qwen35-35b
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN}
    ports:
      - "0.0.0.0:8002:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    shm_size: '64gb'
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      Qwen/Qwen3.5-35B-A3B
      --served-model-name qwen3.5-35b
      --port 8000
      --host 0.0.0.0
      --max-model-len 262144
      --gpu-memory-utilization 0.80
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --enable-prefix-caching
    restart: unless-stopped

  qwen35-122b:
    image: vllm/vllm-openai:cu130-nightly
    container_name: qwen35-122b
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN}
    ports:
      - "0.0.0.0:8003:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    shm_size: '64gb'
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      Qwen/Qwen3.5-122B-A10B
      --served-model-name qwen3.5-122b
      --port 8000
      --host 0.0.0.0
      --max-model-len 65536
      --gpu-memory-utilization 0.75
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --enable-prefix-caching
    restart: unless-stopped
    profiles:
      - large
