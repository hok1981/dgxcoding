services:
  qwen35-a3b:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.2.0rc6
    container_name: qwen35-a3b
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN}
      - MODEL_HANDLE=Qwen/Qwen3.5-35B-A3B
    ports:
      - "0.0.0.0:8002:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./config/trtllm-config.yml:/tmp/extra-llm-api-config.yml
    shm_size: '64gb'
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      bash -c 'huggingface-cli download "$MODEL_HANDLE" &&
        trtllm-serve "$MODEL_HANDLE"
        --max_batch_size 32
        --trust_remote_code
        --port 8000
        --extra_llm_api_options /tmp/extra-llm-api-config.yml'
    restart: unless-stopped
    profiles:
      - qwen35a3b

