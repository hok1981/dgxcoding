version: '3.8'

services:
  qwen35-122b:
    build: .
    container_name: qwen35-122b
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "0.0.0.0:8001:8001"
    volumes:
      - ./models:/app/models
      - huggingface_cache:/root/.cache/huggingface
    shm_size: '32gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      python3 -m sglang.launch_server
      --model-path Qwen/Qwen3.5-122B-A10B
      --port 8001
      --host 0.0.0.0
      --tp-size 1
      --context-length 262144
      --reasoning-parser qwen3
      --trust-remote-code

  qwen35-35b:
    build: .
    container_name: qwen35-35b
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "0.0.0.0:8002:8001"
    volumes:
      - ./models:/app/models
      - huggingface_cache:/root/.cache/huggingface
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      python3 -m sglang.launch_server
      --model-path Qwen/Qwen3.5-35B-A3B
      --port 8001
      --host 0.0.0.0
      --tp-size 1
      --context-length 262144
      --reasoning-parser qwen3
      --trust-remote-code
    profiles:
      - alternative

volumes:
  huggingface_cache:
