services:
  qwen3-a3b:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.2.0rc6
    container_name: qwen3-a3b
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN}
      - MODEL_HANDLE=nvidia/Qwen3-30B-A3B-NVFP4
      - MAX_BATCH_SIZE=32
    ports:
      - "0.0.0.0:8002:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./config/trtllm-config.yml:/tmp/extra-llm-api-config.yml
      - ./config/start_trtllm.sh:/start_trtllm.sh
    shm_size: '64gb'
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: bash /start_trtllm.sh
    restart: unless-stopped
    profiles:
      - qwen3a3b

