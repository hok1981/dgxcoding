  # ── Vision-Language: Qwen2.5-VL-7B-Instruct (vLLM backend) ─────────────────
  # TRT-LLM 1.3.0rc7 has a bug: multimodal input routing not implemented for
  # Qwen2.5-VL (Unknown modality: image). Using vLLM which has full support.
  # Uses standard HF model (BF16, ~14 GiB) — vLLM doesn't use NVFP4 format.
  # Port 8011. First run: ~10-15 min (model download, no CUDA graph compilation).
  qwen25-vl:
    image: vllm/vllm-openai:latest
    container_name: qwen25-vl
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    ports:
      - "0.0.0.0:8011:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    shm_size: '16gb'
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model Qwen/Qwen2.5-VL-7B-Instruct
      --trust-remote-code
      --gpu-memory-utilization 0.25
      --max-model-len 32768
      --limit-mm-per-prompt image=1
      --port 8000
    restart: unless-stopped
    profiles:
      - qwen25vl

  # ── Speech-to-Text: NVIDIA NIM Parakeet 1.1B CTC ───────────────────────────
  # GPU-accelerated STT. Riva API: HTTP :9000, gRPC :50051
  # Requires: NGC_API_KEY in .env (free NVIDIA account)
  # First run: ~5-15 min (CUDA graph compilation)
  parakeet-ctc:
    image: nvcr.io/nim/nvidia/parakeet-1-1b-ctc-en-us:latest
    container_name: parakeet-ctc
    runtime: nvidia
    environment:
      - NGC_API_KEY=${NGC_API_KEY}
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
      - NIM_DISABLE_GRPC_STARTUP=False
      - NIM_TAGS_SELECTOR=name=parakeet-1-1b-ctc-en-us,mode=ofl,vad=silero
    ports:
      - "0.0.0.0:9000:9000"
      - "0.0.0.0:50051:50051"
    shm_size: '8gb'
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - parakeet

  # ── Text-to-Speech: Wyoming Piper (ARM64 CPU) ───────────────────────────────
  # Fast neural TTS (VITS). Wyoming protocol on :10200 for Home Assistant.
  # Downloads voice model on first start (~50MB). CPU-only, no GPU needed.
  wyoming-piper:
    image: rhasspy/wyoming-piper:latest
    container_name: wyoming-piper
    ports:
      - "0.0.0.0:10200:10200"
    volumes:
      - ~/.local/share/piper:/data
    command: --voice en_US-lessac-medium --uri tcp://0.0.0.0:10200 --data-dir /data --download-dir /data
    restart: unless-stopped
    profiles:
      - piper
