print_iter_log: false
kv_cache_config:
  dtype: "auto"
  # Higher fraction than default (0.70) per NVIDIA DGX Spark guidance for 120B models.
  # Leaves less headroom but Nemotron steady-state is ~103 GiB (69.5 model + 33.6 KV cache)
  # which fits in 128 GiB. Parallel weight loading is disabled via env var to prevent
  # the startup memory spike that was causing OOM kills.
  free_gpu_memory_fraction: 0.90
cuda_graph_config:
  enable_padding: true
