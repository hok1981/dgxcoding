print_iter_log: false
kv_cache_config:
  dtype: "auto"
  # Reduced from default 0.70 to prevent OOM. Measured weights ~60 GiB (120B × NVFP4).
  # At 0.90 TRT-LLM pre-allocated 54 GiB KV cache → 114 GiB total → killed.
  # At 0.50: weights (60) + KV cache (30) ≈ 90 GiB → ~30 GiB headroom on 119.7 GiB system.
  # Parallel weight loading disabled via env var to prevent startup spike.
  free_gpu_memory_fraction: 0.50
cuda_graph_config:
  enable_padding: true
