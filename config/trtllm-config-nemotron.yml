print_iter_log: false
kv_cache_config:
  dtype: "auto"
  # free_gpu_memory_fraction = fraction of FREE memory at startup (not total).
  # DGX Spark: ~116 GiB free at start (unified memory, all visible to GPU).
  # At 0.50: 0.50 × 116 = 58 GiB KV + 60 GiB weights + 3 GiB baseline = 121 GiB → OOM
  # At 0.20: 0.20 × 116 = 23 GiB KV + 60 GiB weights + 3 GiB baseline = 86 GiB → 34 GiB headroom
  free_gpu_memory_fraction: 0.20
cuda_graph_config:
  enable_padding: true
